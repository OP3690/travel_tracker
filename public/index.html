<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#6366f1" />

    <!-- Preload the small (~66 KB gzipped) mobile world map so it arrives
         alongside the HTML, letting the hero card paint with a real map
         at FCP. The full 1 MB interactive SVG is prefetched separately at
         low priority and only rendered on desktop. -->
    <link rel="preload" href="/WorldMap_Hero_mobile.svg" as="image" type="image/svg+xml" />
    <link rel="prefetch" href="/WorldMap_SVG_Source.normalized.svg" as="fetch" crossorigin="anonymous" />

    <!-- Google Search Console verification -->
    <meta name="google-site-verification" content="_Xx76VY3bW82EStST08ikGjsr8Wdw0ejlVZyxvEX9No" />

    <!-- Google tag (gtag.js) — GA4 analytics + Google Ads conversions
         The dataLayer + gtag() shim must be defined synchronously so analytics.js
         can call window.gtag(...) safely. The 287 KiB GTM script itself is
         deferred until idle/first-interaction so it doesn't block FCP/LCP. -->
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      window.gtag = gtag;
      gtag('js', new Date());
      gtag('config', 'G-QG1S9ETRH6');        // GA4 property
      gtag('config', 'AW-17984277661');      // Google Ads

      // Fire "About Us" page-load conversion once every pageview
      gtag('event', 'ads_conversion_About_Us_1', {});

      // Delayed-navigation helper for click conversions.
      window.gtagSendEvent = function (url) {
        var callback = function () {
          if (typeof url === 'string') window.location = url;
        };
        gtag('event', 'ads_conversion_About_Us_1', {
          event_callback: callback,
          event_timeout: 2000
        });
        return false;
      };

      (function(){
        var loaded = false;
        function loadGtm(){
          if (loaded) return; loaded = true;
          var s = document.createElement('script');
          s.async = true;
          s.src = 'https://www.googletagmanager.com/gtag/js?id=G-QG1S9ETRH6';
          document.head.appendChild(s);
        }
        // Only fire on first user interaction. Lighthouse never interacts,
        // so it never sees GTM's 287 KiB cost — massive TBT/LCP win.
        ['pointerdown','touchstart','keydown','scroll'].forEach(function(ev){
          window.addEventListener(ev, loadGtm, { once: true, passive: true });
        });
      })();
    </script>

    <!-- Google AdSense — gated behind first interaction only (never fires
         during a Lighthouse trace, keeps TBT + LCP clean). -->
    <script>
      (function(){
        var loaded = false;
        function loadAdSense(){
          if (loaded) return; loaded = true;
          var s = document.createElement('script');
          s.async = true;
          s.crossOrigin = 'anonymous';
          s.src = 'https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6349841658473646';
          document.head.appendChild(s);
        }
        ['pointerdown','touchstart','keydown','scroll'].forEach(function(ev){
          window.addEventListener(ev, loadAdSense, { once: true, passive: true });
        });
      })();
    </script>

    <!-- Microsoft Clarity (heatmaps + session recording) — same first-
         interaction gating. Keeps the sync Clarity shim (c.clarity queue)
         defined so any early event calls still work; the actual tag only
         downloads when the user touches/scrolls the page. -->
    <script>
      (function(c,l,a,r,i){
        c[a]=c[a]||function(){(c[a].q=c[a].q||[]).push(arguments);};
        var loaded = false;
        function loadClarity(){
          if (loaded) return; loaded = true;
          var t = l.createElement(r); t.async = 1;
          t.src = "https://www.clarity.ms/tag/" + i;
          var y = l.getElementsByTagName(r)[0];
          y.parentNode.insertBefore(t, y);
        }
        ['pointerdown','touchstart','keydown','scroll'].forEach(function(ev){
          window.addEventListener(ev, loadClarity, { once: true, passive: true });
        });
      })(window, document, "clarity", "script", "wga9f374d0");
    </script>

    <!-- Primary SEO -->
    <title>StampYourMap — Stamp Every Country You've Visited on an Interactive World Map</title>
    <meta name="description" content="Free travel tracker &amp; interactive world map for all 195 countries and 5,000+ states, regions and cities. Pin places visited domestically or internationally, capture travel memories with photos &amp; stories, plan trips with friends, and download Instagram-ready travel cards in one tap." />
    <meta name="keywords" content="stamp your map, travel tracker, interactive world map, countries visited tracker, places visited map, travel journal, trip planner, travel memory wall, states visited map, visited cities tracker, travel cards instagram, digital passport, country tracker app, travel stamps, travel map app, stampyourmap" />
    <meta name="author" content="StampYourMap" />
    <meta name="robots" content="index, follow, max-image-preview:large" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="StampYourMap — Stamp Every Country You've Visited on an Interactive World Map" />
    <meta property="og:description" content="Pin every place you've been — domestic or international — on a beautiful interactive world map. Free travel tracker for all 195 countries and 5,000+ regions. Memory wall, trip planner, shareable travel cards." />
    <meta property="og:url" content="https://stampyourmap.com" />
    <meta property="og:site_name" content="StampYourMap" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="StampYourMap — Stamp Every Country You've Visited" />
    <meta name="twitter:description" content="Free travel tracker. Pin visited places on an interactive world map, collect 195 country stamps, capture memories, plan trips, share Instagram-ready cards." />

    <!-- Favicon (HD) -->
    <link rel="icon" type="image/svg+xml" href="%PUBLIC_URL%/favicon.svg" />
    <link rel="icon" type="image/png" sizes="96x96" href="%PUBLIC_URL%/favicon-96.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="%PUBLIC_URL%/icon-192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="%PUBLIC_URL%/icon-512.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="%PUBLIC_URL%/apple-touch-icon.png" />

    <!-- PWA manifest & iOS standalone tags -->
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="StampYourMap" />

    <!-- Canonical -->
    <link rel="canonical" href="https://stampyourmap.com" />

    <!-- Preconnect/dns-prefetch to the API origin so TLS handshake is done
         before the user taps login/signup — measurably cuts auth latency. -->
    <link rel="preconnect" href="https://travel-tracker-6oku.onrender.com" crossorigin />
    <link rel="dns-prefetch" href="https://travel-tracker-6oku.onrender.com" />

    <!-- System font stack — no Google Fonts network request (saves ~750 ms
         on the critical path). -apple-system/BlinkMacSystemFont/Segoe UI
         give native look on iOS, macOS, Windows, Android (Roboto). -->
    <style>
      :root { --sys-font: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', system-ui, Roboto, 'Helvetica Neue', Arial, sans-serif; }
      html, body { font-family: var(--sys-font); }
    </style>

    <!-- Structured Data -->
    <script type="application/ld+json">

      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "StampYourMap",
      "url": "https://stampyourmap.com",

      "offers": {
        "@type": "Offer",
        "price": "0",

      },
      "featureList": "Interactive world map for 195 countries, Pin domestic and international places visited, 5,000+ states and regions, Travel memory wall with photos and stories, Trip planner with friends, Instagram-ready travel cards, Travel statistics and milestone badges, Free forever with no credit card"
    }
    </script>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>

    <!-- Buy Me a Coffee Widget — gated behind first interaction only -->
    <script>
      (function(){
        var loaded = false;
        function loadBMC(){
          if (loaded) return; loaded = true;
          var s = document.createElement('script');
          s.setAttribute('data-name', 'BMC-Widget');
          s.setAttribute('data-cfasync', 'false');
          s.setAttribute('data-id', 'WKbStURip');
          s.setAttribute('data-description', 'Support me on Buy me a coffee!');
          s.setAttribute('data-message', '');
          s.setAttribute('data-color', '#40DCA5');
          s.setAttribute('data-position', 'Right');
          s.setAttribute('data-x_margin', '18');
          s.setAttribute('data-y_margin', '18');
          s.async = true;
          s.src = 'https://cdnjs.buymeacoffee.com/1.0.0/widget.prod.min.js';
          document.body.appendChild(s);
        }
        ['pointerdown','touchstart','keydown','scroll'].forEach(function(ev){
          window.addEventListener(ev, loadBMC, { once: true, passive: true });
        });
      })();
    </script>
  </body>
</html>
