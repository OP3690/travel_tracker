<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#6366f1" />

    <!-- Primary SEO -->
    <title>MyTravelGlimpse — Track Every Journey, Map Every Memory</title>
    <meta name="description" content="MyTravelGlimpse is the free travel tracker for 195 countries. Mark visited states on interactive maps, journal destinations, unlock milestone badges, and watch your travel story unfold." />
    <meta name="keywords" content="travel tracker, travel map, visited countries tracker, states visited map, travel journal, trip planner, travel statistics, travel milestones, interactive world map, country map tracker, mytravelglimpse" />
    <meta name="author" content="MyTravelGlimpse" />
    <meta name="robots" content="index, follow, max-image-preview:large" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="MyTravelGlimpse — Track Every Journey, Map Every Memory" />
    <meta property="og:description" content="Free travel tracker for 195 countries. Interactive maps with clickable states, travel journal, milestone badges, and beautiful analytics. Your journey, beautifully mapped." />
    <meta property="og:url" content="https://mytravelglimpse.com" />
    <meta property="og:site_name" content="MyTravelGlimpse" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="MyTravelGlimpse — Your Journey, Beautifully Mapped" />
    <meta name="twitter:description" content="Track visited states across 195 countries, journal destinations, unlock travel milestones. Free forever." />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="%PUBLIC_URL%/favicon.png" />
    <link rel="icon" type="image/svg+xml" href="%PUBLIC_URL%/favicon.svg" />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/favicon.png" />

    <!-- Canonical -->
    <link rel="canonical" href="https://mytravelglimpse.com" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />

    <!-- Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",

      "name": "MyTravelGlimpse",
      "url": "https://mytravelglimpse.com",
      "description": "Free travel tracker for 195 countries. Interactive maps, travel journal, milestone badges, and analytics.",
      "applicationCategory": "TravelApplication",
      "operatingSystem": "Web",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      },
      "featureList": "Interactive maps for 195 countries, Travel journal, Milestone badges, Trip planner, Travel statistics"
    }
