<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#2563eb" />

    <!-- SEO Meta Tags -->
    <title>MyTravelGlimpse - Track Your Travels Across India & The World</title>
    <meta name="description" content="MyTravelGlimpse is your personal travel tracker. Mark visited states, countries on interactive maps, journal destinations, track milestones, and visualize your travel progress beautifully." />
    <meta name="keywords" content="travel tracker, india travel map, world map tracker, travel journal, visited states tracker, travel planner, travel statistics, trip planner india, travel milestones" />
    <meta name="author" content="MyTravelGlimpse" />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph / Social -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="MyTravelGlimpse - Your Personal Travel Map & Journal" />
    <meta property="og:description" content="Visualize your travels on interactive maps, journal your adventures, and watch your exploration progress grow. Track every state, country, and destination." />
    <meta property="og:url" content="https://mytravelglimpse.com" />
    <meta property="og:site_name" content="MyTravelGlimpse" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="MyTravelGlimpse - Track Your Travels Across India & The World" />
    <meta name="twitter:description" content="Your personal travel map. Mark visited places, journal destinations, and unlock travel milestones." />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="%PUBLIC_URL%/favicon.png" />
    <link rel="icon" type="image/svg+xml" href="%PUBLIC_URL%/favicon.svg" />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/favicon.png" />

    <!-- Canonical -->
    <link rel="canonical" href="https://mytravelglimpse.com" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
