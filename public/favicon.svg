<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#6366f1"/>
      <stop offset="55%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
    <radialGradient id="globe" cx="40%" cy="35%" r="70%">
      <stop offset="0%"   stop-color="#ffffff"/>
      <stop offset="60%"  stop-color="#e0e7ff"/>
      <stop offset="100%" stop-color="#c7d2fe"/>
    </radialGradient>
    <radialGradient id="pin" cx="35%" cy="30%" r="70%">
      <stop offset="0%"   stop-color="#fecaca"/>
      <stop offset="40%"  stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#7f1d1d"/>
    </radialGradient>
    <radialGradient id="gloss" cx="30%" cy="20%" r="50%">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <filter id="pinShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6"/>
      <feOffset dx="0" dy="8" result="offsetblur"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.45"/></feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect x="0" y="0" width="512" height="512" rx="112" ry="112" fill="url(#bg)"/>
  <rect x="0" y="0" width="512" height="512" rx="112" ry="112" fill="url(#gloss)"/>

  <circle cx="256" cy="256" r="158" fill="url(#globe)"/>

