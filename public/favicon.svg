    <path d="M 320 175 C 335 170, 355 175, 365 190 C 370 200, 368 215, 360 222 C 350 230, 335 230, 325 224 C 315 218, 310 205, 312 192 C 314 185, 317 180, 320 175 Z"/>
    <path d="M 340 290 C 352 285, 368 288, 375 300 C 380 308, 378 318, 368 322 C 355 326, 342 322, 336 312 C 332 305, 334 296, 340 290 Z"/>
