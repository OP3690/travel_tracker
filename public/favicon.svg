  <circle cx="256" cy="256" r="158" fill="none" stroke="#4f46e5" stroke-width="4" stroke-opacity="0.25"/>

  <g filter="url(#pinShadow)">
    <path d="M 256 165 C 222 165, 195 192, 195 226 C 195 268, 256 360, 256 360 C 256 360, 317 268, 317 226 C 317 192, 290 165, 256 165 Z" fill="url(#pin)"/>
    <path d="M 256 165 C 222 165, 195 192, 195 226 C 195 268, 256 360, 256 360 C 256 360, 317 268, 317 226 C 317 192, 290 165, 256 165 Z" fill="none" stroke="#fca5a5" stroke-width="1.5" stroke-opacity="0.4"/>
    <circle cx="256" cy="220" r="18" fill="#ffffff"/>
